name: palmnazi
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'  # FIXED: Was "^3.10.8" which is invalid syntax

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  logger: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/channels/
    - assets/images/cities/
    - assets/images/places/

# Configuration for the flutter_launcher_icons package
flutter_launcher_icons:
  # 1. Main configuration keys (android, ios, web, etc.)
  android: "launcher_icon" # Use a specific name
  ios: true
  
  # 2. Source image path
  image_path: "assets/images/logo.png"

  # 3. Web configuration (Must be a map/nested block)
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#000000"